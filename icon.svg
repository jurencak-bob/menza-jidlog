<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Jídlogic ikona — koncept F: talíř s quick-pick pillem (v1 2026-04-22).
       Odráží „jednorázový klik na číslo pill" = primární interakci v appce. -->
  <!-- Pozadí: světle šedé rounded square (iOS/Android friendly) -->
  <rect width="512" height="512" rx="112" fill="#F7F7FA"/>
  <!-- Vnější talíř: bílá výplň, fialový outline (brand accent #6B2D8B) -->
  <circle cx="256" cy="256" r="196" fill="#FFFFFF" stroke="#6B2D8B" stroke-width="22"/>
  <!-- Vnitřní kruh talíře: pale purple (brand pale #E9D5F4) pro hloubku -->
  <circle cx="256" cy="256" r="126" fill="#E9D5F4"/>
  <!-- Quick-pick pill: bílá ellipsa s fialovým okrajem -->
  <ellipse cx="256" cy="256" rx="90" ry="78" fill="#FFFFFF" stroke="#6B2D8B" stroke-width="17"/>
  <!-- Číslo „1" — brand fialová, bold, centered -->
  <text x="256" y="295" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="116" font-weight="900" fill="#6B2D8B">1</text>
</svg>

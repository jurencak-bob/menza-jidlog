<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Jídlogic</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6B2D8B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jídlogic">
  <meta name="application-name" content="Jídlogic">
  <meta name="description" content="Jídelníček UTB Menza + zápis obědů">

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #F7F7FA; }

    /* Loader — zobrazí se než se načte iframe -->  */
    .loader {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #F7F7FA;
      transition: opacity 0.4s;
    }
    .loader.hidden { opacity: 0; pointer-events: none; }
    .loader-icon { font-size: 3rem; margin-bottom: 16px; animation: pulse 1.5s ease-in-out infinite; }
    .loader-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #6B2D8B; font-size: 1.1rem; font-weight: 600; }
    .loader-note { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #A0A0B0; font-size: 0.8rem; margin-top: 12px; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } }

    /* Dark mode loader */
    @media (prefers-color-scheme: dark) {
      html, body { background: #1A1A2E; }
      .loader { background: #1A1A2E; }
      .loader-text { color: #B07DD8; }
      .loader-note { color: #6E6E88; }
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: fixed;
      inset: 0;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="loader-icon">📋</div>
    <div class="loader-text">Jídlogic se načítá…</div>
    <div class="loader-note">Pouze pro BL.</div>
  </div>

  <!-- GAS Jídlogic v iframe (?app=obedy explicitně — nezávisle na výchozím routingu doGet) -->
  <iframe
    id="app"
    src="https://script.google.com/a/macros/blogic.cz/s/AKfycbxqAYO0PoeatQpr_Le8c5Eg1C1BUW81EA1dRDLyp2HtqP4-KHWaBCzA7-yCXuJd6OOm/exec?app=obedy"
    allow="clipboard-write"
    loading="eager"
  ></iframe>

  <script>
    // Service Worker registration
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(err) {
        console.warn('SW registration failed:', err);
      });
    }

    // Hide loader when iframe loads
    var iframe = document.getElementById('app');
    var loader = document.getElementById('loader');
    iframe.addEventListener('load', function() {
      setTimeout(function() { loader.classList.add('hidden'); }, 300);
    });
    // Fallback — hide loader after 8s even if load event didn't fire
    setTimeout(function() { loader.classList.add('hidden'); }, 8000);
  </script>
</body>
</html>
